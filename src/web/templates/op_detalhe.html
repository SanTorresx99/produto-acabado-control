<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Conferência de Produção - Leitura</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f6f6f6;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1a1a1a;
        }
        .produto {
            font-size: 20px;
            font-weight: bold;
            color: #123b72;
            text-align: center;
            margin-bottom: 30px;
        }
        .info {
            font-size: 17px;
            font-weight: 600;
            color: #2c2c2c;
            margin-bottom: 12px;
        }
        form {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input[type="text"] {
            padding: 10px;
            width: 100%;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 18px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-registrar {
            background-color: #28a745;
            color: white;
        }
        .btn-voltar {
            background-color: #dee2e6;
            color: #333;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
        }
        .erro {
            margin-top: 15px;
            color: red;
            font-weight: bold;
        }
        .botoes {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Conferência de Produção - Leitura</h2>

        <div class="produto">{{ produto or "None" }}</div>

        <div class="info">Quantidade Prevista: {{ quantidade_prevista or 0 }}</div>
        <div class="info">Quantidade Registrada: {{ quantidade_registrada or 0 }}</div>

        <form method="post" action="/op/{{ op }}/registrar" id="form-leitura">
            <label for="codigo_barras">Código de Barras:</label>
            <input type="text" id="codigo_barras" name="codigo_barras" autofocus autocomplete="off">
            <div class="botoes">
                <a href="/admin" class="btn-voltar">← Voltar</a>
                <button type="submit" class="btn-registrar">Registrar</button>
            </div>
        </form>

        {% if erro %}
        <div class="erro">⚠️ {{ erro }}</div>
        {% endif %}
    </div>

    <script>
        const input = document.getElementById('codigo_barras');
        input.addEventListener('input', function () {
            if (input.value.length === 13) {
                document.getElementById('form-leitura').submit();
            }
        });
    </script>
</body>
</html>
